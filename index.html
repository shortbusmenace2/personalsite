<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shortbusmenace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0b0a;
      --bg2: #131110;
      --accent: #c97d3a;
      --accent-dim: #7a4a1e;
      --text: #e8ddd0;
      --text-dim: #7a6f65;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* Warm radial glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(201, 125, 58, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 90%;
      padding: 3rem 0;
      animation: fadeIn 1.2s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .prompt {
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0.7;
    }

    .prompt::before {
      content: '> ';
    }

    h1 {
      font-family: var(--sans);
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .bio {
      font-family: var(--mono);
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text-dim);
      margin-bottom: 2.5rem;
      max-width: 420px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent-dim);
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-dim);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      transition: color 0.2s ease;
      position: relative;
    }

    .link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .link:hover {
      color: var(--accent);
    }

    .link:hover::after {
      width: 100%;
    }

    .link svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .status {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: var(--accent-dim);
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Scanline effect subtle */
    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(201, 125, 58, 0.03);
      animation: scan 8s linear infinite;
      pointer-events: none;
      z-index: 99;
    }

    @keyframes scan {
      0% { top: -2px; }
      100% { top: 100vh; }
    }
  </style>
</head>
